# Build + unit tests + race detector + SDK mutation-gate audit for the ledger
# service (services/ledger). Merge gate, scoped to the ledger subtree.
#
# Relocated from the standalone ledger repo (.github/workflows/go-test.yml) when
# the ledger moved into services/ledger. GitHub Actions only reads workflows
# from the repo root, so the run steps cd into the module via
# defaults.run.working-directory and setup-go reads services/ledger/go.mod.
name: ledger-go-test

on:
  push:
    branches: [main]
    paths:
      - "services/ledger/**"
      - ".github/workflows/ledger-go-test.yml"
  pull_request:
    paths:
      - "services/ledger/**"
      - ".github/workflows/ledger-go-test.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: services/ledger

jobs:
  build:
    name: build + vet + test
    runs-on: ubuntu-latest
    # The DSN-gated suites (witnessclient rotation invariants, store, the
    # checkpoint capstone, the rotation-appender e2e) silently SKIPPED for as
    # long as CI provisioned no Postgres — which is how two real schema bugs
    # (the inert witness_sets_active index; a string hash_algo seed) shipped
    # dark. This service + the verbatim `make test` invocation (which sets
    # LEDGER_TEST_SERIAL=1 and -p 1 — the shared-DB serialization contract the
    # requireDB guard enforces) make the DB suite run on every PR, not only
    # on developers' laptops.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledger_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: services/ledger/go.mod

      - name: verify-deps (go mod verify + download)
        run: make verify-deps

      - name: go vet
        run: go vet ./...

      # Compile gate for the -tags=chaos tier. The chaos suite runs on a weekly
      # cadence (ledger-chaos.yml), and path filters only catch DIRECT touches —
      # so a refactor in wal/ or store/ can break the chaos-tagged injection
      # points (chaos/trigger_chaos.go + every chaos.Trigger call site) and sit
      # broken for up to a week. This keeps the tagged tier honest on every PR
      # without running it: it must COMPILE even when it doesn't execute.
      - name: go build -tags=chaos (keep the chaos tier compilable)
        run: go build -tags=chaos ./...

      - name: go test (full suite, serial — the Makefile contract)
        env:
          BASEPROOF_TEST_DSN: postgres://postgres:postgres@localhost:5432/ledger_test?sslmode=disable
        run: make test

      - name: SDK mutation-gate audit (audit-sdk)
        run: make audit-sdk

  race:
    name: race detector (critical packages)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: services/ledger/go.mod

      - name: race detector
        run: make test-race

  docker-build:
    name: docker image build (fork)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      # Proves the production image builds, including the third_party/tessera
      # submodule that the default fork variant links — so a Dockerfile/context/
      # submodule regression is caught per-PR, not at release-tag time. The
      # context is the REPO ROOT (override the job's services/ledger working-
      # directory) so the sibling libs/ module — ledger's `replace => ../../libs`
      # target — is in scope, the same cross-module shape services/witness uses.
      - name: docker build (fork — default variant)
        working-directory: ${{ github.workspace }}
        run: |
          docker build \
            -f services/ledger/scripts/local/Dockerfile \
            --build-arg VERSION=ci \
            --build-arg TESSERA_VARIANT=fork \
            -t ledger:ci .
