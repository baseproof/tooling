# Nightly fuzz runs across the ledger's wire-format parsers (services/ledger).
# 15 min per fuzzer; crash artifacts uploaded for triage. Relocated from the
# standalone ledger repo with paths/artifact paths re-rooted under services/ledger.
name: ledger-fuzz

on:
  schedule:
    - cron: "13 4 * * *"   # daily at 04:13 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "services/ledger/**/fuzz_test.go"
      - ".github/workflows/ledger-fuzz.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: services/ledger

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fuzzer:
          - { pkg: ./api,         name: FuzzTileHandlerPath }
          - { pkg: ./bytestore,   name: FuzzGCSTilesObjectKey }
          - { pkg: ./wal,         name: FuzzWALSubmitRead }
          - { pkg: ./cmd/ledger,  name: FuzzNetworkBootstrapJSON }
          - { pkg: ./gossipstore, name: FuzzGossipStoreAppend }
    name: ${{ matrix.fuzzer.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: services/ledger/go.mod

      - name: Fuzz ${{ matrix.fuzzer.name }}
        run: |
          go test -run=^$ -fuzz=^${{ matrix.fuzzer.name }}$ \
              -fuzztime=15m -timeout=20m ${{ matrix.fuzzer.pkg }}

      - name: Upload crash artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: fuzz-crash-${{ matrix.fuzzer.name }}
          path: services/ledger/${{ matrix.fuzzer.pkg }}/testdata/fuzz/
