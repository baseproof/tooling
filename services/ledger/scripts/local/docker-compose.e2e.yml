# scripts/local/docker-compose.e2e.yml
#
# End-to-end test topology. Provisions Postgres + a real witness daemon
# container (the published tooling witness image) so e2e tests exercise
# the Ledger's cosign client against a docker-isolated witness over real HTTP.
#
# WHY A SEPARATE COMPOSE FILE
#
#   docker-compose.testharness.yml provisions ONLY postgres for
#   the broad integration suite that runs in-process httptest
#   cosign servers. This file adds the witness container for the
#   e2e path that tests "Ledger talks to a docker-provisioned
#   witness daemon, end-to-end".
#
#   Both compose files are accepted by `docker compose` in
#   parallel — the testharness one is the postgres source,
#   this one adds the witness service. CI scripts can `up -d`
#   either or both.
#
# KEY VOLUMES
#
#   The witness key + network bootstrap doc are generated on the
#   HOST by scripts/run-e2e.sh (via go run ./cmd/genesis-ceremony dev)
#   and bind-mounted READ-ONLY into the container. The host path
#   is interpolated from the E2E_KEYS_DIR env var so the script
#   can point at any directory (defaults to .run/e2e/).
#
# Bring-up:
#   ./scripts/run-e2e.sh
#
# Tear-down:
#   ./scripts/run-e2e.sh down

services:
  # ─────────────────────────────────────────────────────────────────
  # Postgres — the Ledger's metadata + index store. Same image,
  # same env, same port as docker-compose.testharness.yml so a
  # developer can switch between the two without re-pointing DSNs.
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: baseproof_e2e_postgres
    environment:
      POSTGRES_USER: baseproof
      POSTGRES_PASSWORD: baseproof
      POSTGRES_DB: baseproof_test
    command: ["postgres", "-c", "fsync=off", "-c", "synchronous_commit=off", "-c", "full_page_writes=off"]
    ports:
      - "127.0.0.1:5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseproof -d baseproof_test"]
      interval: 2s
      timeout: 2s
      retries: 30

  # ─────────────────────────────────────────────────────────────────
  # witness — the network witness daemon for the e2e fixture. Strict-pull:
  # the published image from tooling (ghcr.io/<owner>/tooling/
  # witness) — the ledger builds no witness, and needs no witness source
  # checkout. Reads its PEM key + bootstrap doc (minted on the host by
  # scripts/run-e2e.sh via cmd/genesis-ceremony dev) from a read-only bind mount.
  # ─────────────────────────────────────────────────────────────────
  witness:
    image: ${WITNESS_IMAGE:-ghcr.io/baseproof/tooling/witness:latest}
    container_name: baseproof_e2e_witness
    command:
      - "-addr=:8081"
      - "-key-file=/keys/witnesses/witness-1.pem"
      - "-bootstrap=/keys/network-bootstrap.json"
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      # E2E_KEYS_DIR is set by scripts/run-e2e.sh to the host path
      # where genesis-ceremony dev wrote witness-1.pem + bootstrap json.
      # Read-only bind so the witness can't accidentally mutate
      # the keys.
      - "${E2E_KEYS_DIR:-../../.run/e2e}:/keys:ro"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/healthz | grep -q '^ok$$' || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
