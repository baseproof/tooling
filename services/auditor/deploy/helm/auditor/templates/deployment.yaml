{{/*
Deployment. The auditor is a singleton verifier (replicas=1 default).

Inputs:
  - Non-secret AUDITOR_* env via envFrom (the ConfigMap).
  - The gossip DSN (AUDITOR_GOSSIP_DSN) injected as a single env var from a
    Secret (operator-supplied existingSecret, or the chart-managed inline
    "<fullname>-db") — it is secret, so NOT in the ConfigMap.
  - bootstrap / gossip signing key / amendment mounted as Secrets at the
    STANDARD /etc/auditor paths the binary auto-detects — NO *_FILE env is set
    (the orchestrator-agnostic convention).

The auditor serves PLAIN HTTP ONLY, so the probe scheme is always HTTP.
*/}}
{{- include "auditor.validate" . -}}
{{- include "auditor.validateDatabase" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auditor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auditor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "auditor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auditor.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the pod when non-secret env or the chart-managed gossip-DSN
        # Secret rotates.
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret-db: {{ include (print $.Template.BasePath "/secret-db.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "auditor.serviceAccountName" . }}
      # The auditor never calls the Kubernetes API — don't mount its token.
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: auditor
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.postgresql.enabled }}
          # In-cluster Postgres (bitnami sub-chart): compose AUDITOR_GOSSIP_DSN
          # at boot from individual env vars — host/user/db inline, password from
          # the bitnami auth Secret. Works for both auth.password and
          # auth.existingSecret without re-rendering (the ledger chart's pattern).
          command: ["/bin/sh", "-c"]
          args:
            - |
              export AUDITOR_GOSSIP_DSN="postgres://${AUDITOR_DB_USER}:${AUDITOR_DB_PASSWORD}@${AUDITOR_DB_HOST}:${AUDITOR_DB_PORT}/${AUDITOR_DB_NAME}?sslmode=disable"
              exec /auditor
          {{- else }}
          {{- with .Values.extraArgs }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
          envFrom:
            - configMapRef:
                name: {{ include "auditor.fullname" . }}
          env:
            {{- if .Values.postgresql.enabled }}
            - name: AUDITOR_DB_HOST
              value: {{ printf "%s-postgresql" .Release.Name | quote }}
            - name: AUDITOR_DB_PORT
              value: "5432"
            - name: AUDITOR_DB_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: AUDITOR_DB_NAME
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: AUDITOR_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "auditor.bitnamiSecretName" . }}
                  key: {{ include "auditor.bitnamiPasswordKey" . }}
            {{- else }}
            # The gossip DSN is secret — injected from the operator's Secret or
            # the chart-managed inline Secret, never from the ConfigMap.
            - name: AUDITOR_GOSSIP_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "auditor.externalDbSecretName" . }}
                  key: AUDITOR_GOSSIP_DSN
            {{- end }}
            {{- range $k, $v := .Values.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- with .Values.container.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- /* The auditor serves PLAIN HTTP ONLY (no server TLS), so the
                 liveness/readiness probe scheme is ALWAYS HTTP. */}}
          livenessProbe:
            {{- $live := deepCopy .Values.container.livenessProbe }}
            {{- $_ := set $live.httpGet "scheme" "HTTP" }}
            {{- toYaml $live | nindent 12 }}
          readinessProbe:
            {{- $ready := deepCopy .Values.container.readinessProbe }}
            {{- $_ := set $ready.httpGet "scheme" "HTTP" }}
            {{- toYaml $ready | nindent 12 }}
          resources:
            {{- toYaml .Values.container.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem is on, so give the process a writable /tmp.
            - name: tmp
              mountPath: /tmp
            # Standard bootstrap/key/amendment mount paths — the binary auto-
            # detects these, so NO *_FILE env is set.
            - name: bootstrap
              mountPath: /etc/auditor/bootstrap.json
              subPath: bootstrap.json
              readOnly: true
            {{- if .Values.gossipSigningKey.existingSecret }}
            - name: gossip-signing-key
              mountPath: /etc/auditor/keys
              readOnly: true
            {{- end }}
            {{- if .Values.amendment.existingSecret }}
            - name: amendment
              mountPath: /etc/auditor/amendment.json
              subPath: amendment.json
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- /* Key material is 0440 (owner root, group-readable): the pod's
               fsGroup (65532) makes it readable by the non-root process while
               keeping it from being world-readable inside the container. */}}
        - name: bootstrap
          secret:
            secretName: {{ .Values.bootstrap.existingSecret }}
            defaultMode: 0440
            items:
              - key: {{ .Values.bootstrap.key }}
                path: bootstrap.json
        {{- if .Values.gossipSigningKey.existingSecret }}
        - name: gossip-signing-key
          secret:
            secretName: {{ .Values.gossipSigningKey.existingSecret }}
            defaultMode: 0440
            items:
              - key: {{ .Values.gossipSigningKey.key }}
                path: gossip-signing.pem
        {{- end }}
        {{- if .Values.amendment.existingSecret }}
        - name: amendment
          secret:
            secretName: {{ .Values.amendment.existingSecret }}
            defaultMode: 0440
            items:
              - key: {{ .Values.amendment.key }}
                path: amendment.json
        {{- end }}
