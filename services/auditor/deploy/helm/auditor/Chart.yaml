apiVersion: v2
name: auditor
description: Baseproof standalone auditor — an independent K-of-N quorum verifier and gossip equivocation detector.
type: application

# Chart version. Bump on every chart change.
version: 0.1.1

# Tracks the auditor image tag this chart's defaults target.
# Override per-deploy via .Values.image.tag.
appVersion: "0.1.5"

kubeVersion: ">= 1.23.0"

home: https://github.com/baseproof/tooling
sources:
  - https://github.com/baseproof/tooling

maintainers:
  - name: clearcompass-ai

# bitnami/postgresql sub-chart (in-cluster gossip-DSN Postgres), mirroring the
# ledger chart's pattern. Off by default — set postgresql.enabled=true to run
# Postgres in-cluster via Helm, or point database.existingSecret / database.url
# at an existing endpoint (Cloud SQL, RDS, an operator-managed cluster).
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: security
