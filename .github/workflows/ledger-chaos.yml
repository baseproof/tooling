# Chaos test suite for the ledger service (services/ledger). Build-tag-isolated;
# weekly + manual + opt-in on hot-path PRs. NOT a per-PR merge gate. Relocated
# from the standalone ledger repo with paths re-rooted under services/ledger.
name: ledger-chaos

on:
  schedule:
    - cron: "37 5 * * 0"   # Sunday 05:37 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "services/ledger/tests/chaos/**"
      - "services/ledger/lifecycle/safe_run.go"
      - "services/ledger/lifecycle/shutdown.go"
      - "services/ledger/store/breaker.go"
      - "services/ledger/wal/**"
      - ".github/workflows/ledger-chaos.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: services/ledger

jobs:
  chaos:
    runs-on: ubuntu-latest
    # Without a database the entire chaos suite skips its DSN gates and the
    # job goes green having tested nothing (the shipped-dark mode). The suite
    # is cheap (~15s) — give it a real Postgres on every run.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledger_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: services/ledger/go.mod

      - name: chaos suite
        env:
          BASEPROOF_TEST_DSN: postgres://postgres:postgres@localhost:5432/ledger_test?sslmode=disable
        run: make test-chaos
