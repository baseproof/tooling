# Minimal local-dev stack for the ledger daemon (cmd/ledger).
#
# Every var below is a CANONICAL LEDGER_* name the binary actually reads
# (cmd/ledger/config.go) — the SAME contract the Helm chart sets, so one image is
# configured identically here and in k8s. (The pre-fix file set BASEPROOF_* names
# the daemon ignores, plus a `tessera-personality` service with no Dockerfile —
# both removed: Tessera runs IN-PROCESS, there is no external tessera URL.)
#
# This is the SMALLEST runnable stack (postgres + ledger). For the full local
# topology (object store, witnesses, bootstrap, mTLS) use docker-compose.e2e.yml
# or docker-compose.integration.yml.
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: baseproof
      POSTGRES_PASSWORD: baseproofpassword
      POSTGRES_DB: baseproof
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseproof"]
      interval: 5s
      timeout: 5s
      retries: 5

  ledger:
    build:
      # Repo-root context so the Dockerfile can COPY the sibling libs/ module
      # (ledger's `replace => ../../libs` target). Same shape as services/witness.
      context: ../../../../
      dockerfile: services/ledger/scripts/local/Dockerfile
    environment:
      # Canonical LEDGER_* contract (cmd/ledger/config.go).
      - LEDGER_LOG_DID=did:baseproof:ledger:local:001
      - LEDGER_DATABASE_URL=postgres://baseproof:baseproofpassword@postgres:5432/baseproof?sslmode=disable
      - LEDGER_ADDR=:8080
      - LEDGER_LOG_LEVEL=debug
      # Tessera + tiles are in-process on local POSIX dirs (the image creates and
      # owns /var/lib/baseproof/* as uid 65532). No external tessera service.
      - LEDGER_TILE_BACKEND=posix
      # Certs/keys/bootstrap follow the standard injection convention: drop them
      # at /etc/ledger/{tls,keys,bootstrap.json} (uncomment the mount) and the
      # daemon picks them up with ZERO extra env. Plain HTTP when absent.
      # volumes:
      #   - ./.run/ledger:/etc/ledger:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
