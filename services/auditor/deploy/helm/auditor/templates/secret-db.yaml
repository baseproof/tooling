{{/*
Chart-managed gossip-DSN Secret. Emitted only when:
  - database.existingSecret is empty (no operator-supplied Secret to
    reference), AND
  - database.url is set (we have something to write).

When database.existingSecret is set, the deployment references the operator's
pre-existing Secret directly (with key AUDITOR_GOSSIP_DSN).
*/}}
{{- include "auditor.validateDatabase" . -}}
{{- if and (not .Values.database.existingSecret) .Values.database.url -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auditor.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auditor.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUDITOR_GOSSIP_DSN: {{ .Values.database.url | quote }}
{{- end }}
